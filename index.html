<!DOCTYPE html>
<html>
<head>
<title>AWS Cloud Project</title>

<style>
body{
font-family: Arial;
background-color:#f2f2f2;
text-align:center;
margin-top:100px;
}

form{
background:white;
padding:30px;
display:inline-block;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

input{
padding:10px;
width:250px;
margin:10px;
}

button{
padding:10px 20px;
background:#ff9900;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:5px;
}
</style>

</head>

<body>

<h2>User Registration</h2>

<form id="form">

<input type="text" id="name" placeholder="Enter Name" required><br>

<input type="email" id="email" placeholder="Enter Email" required><br>

<button type="submit">Submit</button>

</form>

<script>

document.getElementById("form").addEventListener("submit", async function(e){

e.preventDefault();

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;

try{

const response = await fetch("https://vc49lhjvge.execute-api.us-east-1.amazonaws.com/dev/submit",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
email:email
})

});

const data = await response.text();

alert("Data Submitted Successfully");

}catch(error){

console.error("Error:",error);

alert("Submission Failed");

}

});

</script>

</body>
</html>
